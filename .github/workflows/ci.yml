name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Workspace-wide, not just apps/web. packages/shared was never typechecked
      # in CI despite being imported by both the app and the Edge Function.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm test

      # P1-F13.5: fixtures accumulating in the live project is the early,
      # silent symptom of a suite that stopped tearing down — and the state
      # that misled the ownership backfill into destroying real data. Runs
      # even when the suite failed, because a failed suite is exactly when
      # teardown is most likely to have been skipped.
      - name: Test accounts are clean
        if: always()
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/check-test-accounts.mjs

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # WebKit as well as Chromium. The app targets iOS Safari; it was dropped
      # locally only because that machine cannot install WebKit's system
      # dependencies without root. These runners can.
      - name: Install browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: End-to-end
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm test:e2e

      # P1-F13.5: fixtures accumulating in the live project is the early,
      # silent symptom of a suite that stopped tearing down — and the state
      # that misled the ownership backfill into destroying real data. Runs
      # even when the suite failed, because a failed suite is exactly when
      # teardown is most likely to have been skipped.
      - name: Test accounts are clean
        if: always()
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/check-test-accounts.mjs

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
